<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مرحباً بك</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    h1 {
      color: #e8e8ff;
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 2.5rem;
      text-shadow: 0 0 30px rgba(130, 100, 255, 0.4);
      letter-spacing: 0.02em;
    }

    .glow-btn {
      background: transparent;
      color: #a78bfa;
      border: 2px solid #7c3aed;
      padding: 0.85rem 2.5rem;
      font-size: 1.4rem;
      font-family: inherit;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 12px #7c3aed,
        0 0 30px rgba(124, 58, 237, 0.4),
        inset 0 0 12px rgba(124, 58, 237, 0.1);
      animation: pulse-glow 2.5s ease-in-out infinite;
      transition: transform 0.15s ease;
    }

    .glow-btn:hover {
      transform: scale(1.06);
    }

    .glow-btn:active {
      transform: scale(0.97);
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow:
          0 0 12px #7c3aed,
          0 0 30px rgba(124, 58, 237, 0.4),
          inset 0 0 12px rgba(124, 58, 237, 0.1);
      }
      50% {
        box-shadow:
          0 0 22px #9f6fe8,
          0 0 60px rgba(124, 58, 237, 0.7),
          0 0 100px rgba(124, 58, 237, 0.3),
          inset 0 0 20px rgba(124, 58, 237, 0.2);
      }
    }
  </style>
</head>
<body>
  <h1>مرحباً بك</h1>
  <button class="glow-btn">ابدأ الآن</button>
  <div style="margin-top: 40px; width: 100%; max-width: 800px;">
    <iframe
      width="100%"
      height="450"
      src="https://www.youtube.com/embed/W7gNj--8QHY?rel=0&modestbranding=1&iv_load_policy=3"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>

  <div style="margin-top: 40px; width: 100%; max-width: 800px; padding: 0 1rem;">
    <video controls style="width:100%; border-radius:12px; box-shadow:0 0 30px rgba(124,58,237,0.5);">
      <source src="https://pub-2137eb30a1514b77b8e13df0edf8d86b.r2.dev/sample.mp4" type="video/mp4">
      متصفحك لا يدعم تشغيل الفيديو.
    </video>
  </div>
</body>
</html>
